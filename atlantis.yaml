version: 3
automerge: true 
autodiscover: 
  mode: auto
delete_source_branch_on_merge: true 
parallel_plan: true
parallel_apply: true
abort_on_execution_order_fail: true
projects:
- workflow: terragrunt
  dir: dev/
  autoplan: # Available since v0.1.0
    when_modified: ["*.tf", "modules/**/*.tf", ".terraform.lock.hcl","*.hcl","_env_common/**/**/*"]
    enabled: true

workflows:
  terragrunt:
    plan:
      steps:
      - env:
          name: TERRAGRUNT_TFPATH
          command: 'echo "terraform${ATLANTIS_TERRAFORM_VERSION}"'
      - env:
          # Reduce Terraform suggestion output
          name: TF_IN_AUTOMATION
          value: 'true'
      - run:
          command: terragrunt run --all --non-interactive plan $(printf '%s' "$COMMENT_ARGS" | sed 's/,/ /g' | tr -d '\\') -no-color

    apply:
      steps:
      - env:
          name: TERRAGRUNT_TFPATH
          command: 'echo "terraform${ATLANTIS_TERRAFORM_VERSION}"'
      - env:
          # Reduce Terraform suggestion output
          name: TF_IN_AUTOMATION
          value: 'true'
      - run: terragrunt run --all apply --non-interactive -no-color